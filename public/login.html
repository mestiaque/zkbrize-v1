<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZK Bridge — Login</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f0f2f8;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 4px 24px rgba(0,0,0,.10);
    padding: 40px 36px;
    width: 360px;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 28px;
  }
  .logo-icon {
    width: 40px; height: 40px;
    background: #6c63ff;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-weight: 700; font-size: 16px;
  }
  .logo-text { font-size: 18px; font-weight: 700; color: #1a1a2e; }
  .logo-sub { font-size: 12px; color: #888; margin-top: 2px; }
  h2 { font-size: 20px; font-weight: 600; color: #1a1a2e; margin-bottom: 6px; }
  p.sub { font-size: 13px; color: #888; margin-bottom: 24px; }
  label { display: block; font-size: 13px; font-weight: 500; color: #555; margin-bottom: 6px; }
  input {
    width: 100%; padding: 10px 12px;
    border: 1.5px solid #e0e3ea; border-radius: 8px;
    font-size: 14px; color: #1a1a2e; outline: none;
    transition: border-color .15s;
    margin-bottom: 16px;
  }
  input:focus { border-color: #6c63ff; }
  button {
    width: 100%; padding: 11px;
    background: #6c63ff; color: #fff;
    border: none; border-radius: 8px;
    font-size: 14px; font-weight: 600; cursor: pointer;
    transition: background .15s;
    margin-top: 4px;
  }
  button:hover { background: #5a52e0; }
  button:disabled { background: #b0abf5; cursor: not-allowed; }
  .error {
    background: #fff1f0; border: 1px solid #ffa39e;
    color: #cf1322; border-radius: 8px;
    padding: 10px 14px; font-size: 13px;
    margin-bottom: 16px; display: none;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">ZK</div>
    <div>
      <div class="logo-text">ZK Bridge</div>
      <div class="logo-sub">Laravel Connector</div>
    </div>
  </div>
  <h2>Sign in</h2>
  <p class="sub">Enter your credentials to continue</p>
  <div class="error" id="err"></div>
  <form onsubmit="doLogin(event)">
    <label>Username</label>
    <input type="text" id="username" placeholder="Username" autocomplete="username" required>
    <label>Password</label>
    <input type="password" id="password" placeholder="Password" autocomplete="current-password" required>
    <button type="submit" id="btn">Sign In</button>
  </form>
</div>
<script>
async function doLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('btn');
  const err = document.getElementById('err');
  btn.disabled = true; btn.textContent = 'Signing in…';
  err.style.display = 'none';
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: document.getElementById('username').value.trim(),
        password: document.getElementById('password').value,
      }),
    });
    const data = await res.json();
    if (data.success) {
      window.location.href = '/';
    } else {
      err.textContent = data.error || 'Invalid username or password';
      err.style.display = 'block';
    }
  } catch {
    err.textContent = 'Connection error. Try again.';
    err.style.display = 'block';
  }
  btn.disabled = false; btn.textContent = 'Sign In';
}
</script>
</body>
</html>
